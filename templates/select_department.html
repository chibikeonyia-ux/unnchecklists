{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Select Your Faculty</h2>
    <p>Choose your Faculty to view your registration checklist.</p>

    <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
        {% for dept in departments %}
            <a href="{{ url_for('checklist') }}?department={{ dept|urlencode }}">
                <button style="width:100%;">{{ dept }}</button>
            </a>
        {% endfor %}
    </div>

    <div style="margin-top:25px;">
        <a href="{{ url_for('home') }}">← Back to Home</a>
    </div>
</div>

{% endblock %}
