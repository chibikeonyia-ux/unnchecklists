{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Select Your Faculty</h2>
    <p class="section-lead">Choose your faculty to view the department-specific checklist.</p>

    <div class="stack" style="margin-top: 18px;">
        {% for dept in departments %}
            <a class="btn btn-outline btn-block" href="{{ url_for('checklist') }}?department={{ dept|urlencode }}">
                {{ dept }}
            </a>
        {% endfor %}
    </div>

    <div style="margin-top: 20px;">
        <a class="link-muted" href="{{ url_for('home') }}">&larr; Back to Home</a>
    </div>
</div>

{% endblock %}
