{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Edit FAQ</h2>
    <p class="section-lead">Update the question or answer to keep it accurate.</p>

    <form method="POST" action="{{ url_for('admin_edit_faq', faq_id=faq.id) }}" class="stack" data-submit-message="Updating FAQ...">
        <div class="form-field">
            <label for="faqCategory">Category</label>
            <select id="faqCategory" name="category_id" required>
                <option value="">-- Select Category --</option>
                {% for category in categories %}
                    <option value="{{ category.id }}" {% if faq.category_id == category.id %}selected{% endif %}>
                        {{ category.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-field">
            <label for="faqQuestion">Question</label>
            <input id="faqQuestion" type="text" name="question" value="{{ faq.question }}" required>
        </div>

        <div class="form-field">
            <label for="faqAnswer">Answer</label>
            <textarea id="faqAnswer" name="answer" required rows="5">{{ faq.answer }}</textarea>
        </div>

        <button type="submit">Update FAQ</button>
    </form>

    <div style="margin-top: 18px;">
        <a class="link-muted" href="{{ url_for('admin_faqs') }}">&larr; Back to FAQ list</a>
    </div>
</div>

{% endblock %}
