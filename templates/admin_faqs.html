{% extends "base.html" %}
{% block content %}

<h2>Manage FAQs</h2>

<a href="{{ url_for('admin_add_faq') }}">
    <button>Add New FAQ</button>
</a>
<a href="{{ url_for('admin_faq_categories') }}">
    <button>Manage Categories</button>
</a>

{% if faqs %}
<table border="1" cellpadding="8" cellspacing="0" style="margin-top:20px; width:100%;">
    <tr>
        <th>ID</th>
        <th>Category</th>
        <th>Question</th>
        <th>Answer</th>
        <th>Actions</th>
    </tr>
    {% for faq in faqs %}
    <tr>
        <td>{{ faq.id }}</td>
        <td>{{ faq.category_name }}</td>
        <td>{{ faq.question }}</td>
        <td>{{ faq.answer }}</td>
        <td>
            <a href="{{ url_for('admin_edit_faq', faq_id=faq.id) }}">Edit</a> |
            <a href="{{ url_for('admin_delete_faq', faq_id=faq.id) }}"
               onclick="return confirm('Are you sure you want to delete this FAQ?')">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>No FAQs found.</p>
{% endif %}

{% endblock %}
