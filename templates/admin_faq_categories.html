{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>FAQ Categories</h2>
    <p class="section-lead">Organize FAQs by category to make them easier to browse.</p>
</div>

<div class="card">
    <h3>Add Category</h3>
    <form method="POST" action="{{ url_for('add_category_route') }}" class="action-row" data-submit-message="Adding category...">
        <input type="text" name="name" class="input" placeholder="Category name" required style="flex: 1; min-width: 220px;">
        <button type="submit">Add Category</button>
    </form>
</div>

<div class="card">
    <h3>Existing Categories</h3>

    {% if categories %}
        <div class="stack">
            {% for cat in categories %}
                <div class="checklist-item">
                    <form method="POST" action="{{ url_for('update_category_route', cat_id=cat.id) }}" class="action-row" data-submit-message="Updating category...">
                        <input type="text" name="name" value="{{ cat.name }}" required style="flex: 1; min-width: 200px;">
                        <button type="submit">Update</button>
                    </form>

                    <form method="POST" action="{{ url_for('delete_category_route', category_id=cat.id) }}"
                          onsubmit="return confirm('Are you sure you want to delete this category?');"
                          style="margin-top: 10px;">
                        <button type="submit" class="btn-danger">Delete</button>
                    </form>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="helper-text">No categories created yet.</p>
    {% endif %}
</div>

{% endblock %}
