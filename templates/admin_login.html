{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Admin Login</h2>
    <p class="section-lead">Authorized staff only. Sign in to manage departments and FAQs.</p>

    {% if error %}
        <p class="error-text">{{ error }}</p>
    {% endif %}

    <form method="POST" class="stack" data-submit-message="Signing in...">
        <div class="form-field">
            <label for="adminUsername">Admin username</label>
            <input id="adminUsername" type="text" name="username" placeholder="Admin username" required>
        </div>

        <div class="form-field">
            <label for="adminPassword">Password</label>
            <input id="adminPassword" type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>
    </form>
</div>

{% endblock %}
