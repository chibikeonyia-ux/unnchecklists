{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Login</h2>

    <form method="POST">
        <input type="text"
               name="username"
               placeholder="Enter your username"
               required>

        <br><br>

        <input type="password"
               name="password"
               placeholder="Enter your password"
               required>

        <br><br>

        <button type="submit">Login</button>
    </form>

    <p style="margin-top:15px;">
        No account?
        <a href="{{ url_for('register') }}">Create one</a>
    </p>
</div>

{% endblock %}
