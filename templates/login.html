{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Login</h2>
    <p class="section-lead">Sign in to continue your UNN registration checklist.</p>

    <form method="POST" class="stack" data-submit-message="Signing you in...">
        <div class="form-field">
            <label for="loginUsername">Username</label>
            <input id="loginUsername" type="text" name="username" placeholder="Enter your username" required>
        </div>

        <div class="form-field">
            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <p class="helper-text">
        No account?
        <a class="link-muted" href="{{ url_for('register') }}">Create one</a>
    </p>
</div>

{% endblock %}
